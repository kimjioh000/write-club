<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Writing Club</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@700&family=Nanum+Myeongjo:wght@400;800&family=Nanum+Pen+Script&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css?v=240724c">
</head>
<body class="topic-page">

  <header class="topic__header">
    <a class="home-link" href="topics.html">← Back</a>
    <h1 class="topic__name" id="topicName"></h1>
    <!-- 로그인했으면 내 이름이, 안 했으면 Sign in이 보인다 -->
    <span class="me" id="me" hidden>
      <span id="meName"></span>
      <button class="me__out" type="button" id="logoutButton">out</button>
    </span>
    <button class="me__in" id="signInButton" type="button" hidden>Sign in</button>
    <button class="write-button" id="writeButton" type="button">Write</button>
  </header>

  <!-- 이 단어에 글을 올린 사람들. 먼저 올린 순서대로 쌓인다 -->
  <ul class="writers" id="writers"></ul>

  <main>
    <!-- 제목 덩어리들이 흩어지는 자리. js/topic.js가 채운다 -->
    <div class="field" id="field"></div>
    <p class="field__message" id="fieldMessage">Loading…</p>
  </main>

  <!-- 글 쓰는 창 -->
  <dialog class="sheet sheet--write" id="writeDialog">
    <!-- tabindex=-1: 창이 열릴 때 여기(빈 영역)에 포커스를 줘서
         제목칸이 자동으로 눌려 키보드가 튀어나오는 걸 막는다.
         전체화면이 먼저 뜨고, 사용자가 탭하면 그때 키보드가 올라온다. -->
    <div class="editor" tabindex="-1">
      <!-- 상단: 왼쪽 Close, 오른쪽 글자 수 (같은 크기·높이) -->
      <div class="editor__top">
        <button class="editor__close" type="button" id="writeCancel">✕ Close</button>
        <div class="editor__count"><span id="charCount">0</span> chars</div>
      </div>

      <!-- 제목 (레퍼런스에서 주제 자리).
           input이 아니라 contenteditable인 이유: 폰에서 글씨가 16px보다 작은
           input칸을 누르면 화면이 확대되는데, contenteditable은 그러지 않는다. -->
      <div class="editor__title is-empty" id="titleInput" contenteditable="true"
           data-placeholder="Title"></div>

      <!-- 본문: 서식 있는 글 -->
      <div class="editor__body" id="bodyInput" contenteditable="true"
           data-placeholder="Share your thoughts."></div>

      <p class="write-form__error" id="writeError" hidden></p>
    </div>

    <!-- 하단 툴바 (키보드 위에 붙는다): 왼쪽 복사, 가운데 서식, 오른쪽 Done -->
    <div class="toolbar" id="writeToolbar">
      <button class="toolbar__side" type="button" id="copyBody" title="Copy text">⧉ Copy</button>

      <div class="toolbar__tools">
        <button class="toolbar__tool" type="button" data-cmd="justifyLeft" title="Align left">⇤</button>
        <button class="toolbar__tool" type="button" data-cmd="justifyCenter" title="Align center">≡</button>
        <button class="toolbar__tool" type="button" data-cmd="justifyRight" title="Align right">⇥</button>
        <span class="toolbar__sep"></span>
        <button class="toolbar__tool" type="button" data-cmd="bold" title="Bold"><b>B</b></button>
        <button class="toolbar__tool" type="button" data-cmd="italic" title="Italic"><i>I</i></button>
        <button class="toolbar__tool" type="button" data-cmd="underline" title="Underline"><u>U</u></button>
      </div>

      <button class="toolbar__side toolbar__side--done" type="button" id="writeSubmit">Done</button>
    </div>

    <!-- 나가려 할 때 임시저장 여부를 묻는 확인 바 -->
    <div class="draft-confirm" id="draftConfirm" hidden>
      <span class="draft-confirm__ask">작성 중인 글이 있어요. 임시저장할까요?</span>
      <div class="draft-confirm__buttons">
        <button class="button button--quiet" type="button" id="draftKeep">계속 쓰기</button>
        <button class="button button--quiet" type="button" id="draftDiscard">저장 안 함</button>
        <button class="button" type="button" id="draftSave">임시저장</button>
      </div>
    </div>
  </dialog>

  <!-- 글 읽는 창 -->
  <dialog class="sheet" id="readDialog">
    <article>
      <!-- 팝업이 열릴 때 포커스가 여기(맨 위)에 머물게 한다.
           안 그러면 <dialog>가 첫 입력칸(맨 아래 댓글칸)으로 포커스를 옮겨
           폰에서 그 자리로 확대·스크롤된다. -->
      <h2 class="read__title" id="readTitle" tabindex="-1" autofocus></h2>
      <p class="read__body" id="readBody"></p>
      <p class="read__nickname" id="readNickname"></p>
    </article>

    <!-- 댓글 -->
    <section class="comments">
      <ul class="comments__list" id="commentList"></ul>

      <!-- 로그인한 사람에게만 보인다 -->
      <form class="comments__form" id="commentForm" hidden>
        <input class="comments__input" id="commentInput" type="text" maxlength="1000"
               placeholder="Leave a comment" autocomplete="off">
        <label class="comments__secret">
          <input type="checkbox" id="commentSecret">
          <span>secret</span>
        </label>
        <button class="comments__send" type="submit">Post</button>
      </form>

      <!-- 로그인 전에 보인다 -->
      <p class="comments__signin" id="commentSignin" hidden>Sign in to leave a comment.</p>
    </section>

    <p class="write-form__error" id="deleteError" hidden></p>

    <!-- Delete를 누르면 이 확인 줄이 나온다 -->
    <p class="delete-confirm" id="deleteConfirm" hidden>
      <span class="delete-confirm__ask">Delete this? This can't be undone.</span>
      <button class="button button--danger" type="button" id="deleteYes">Yes, delete</button>
      <button class="button button--quiet" type="button" id="deleteNo">Cancel</button>
    </p>

    <div class="sheet__buttons" id="readButtons">
      <!-- Edit, Delete는 내 글일 때만 보인다 -->
      <button class="button button--quiet" type="button" id="editStart" hidden>Edit</button>
      <button class="button button--quiet" type="button" id="deleteStart" hidden>Delete</button>
      <button class="button button--quiet" type="button" id="readClose">Close</button>
    </div>
  </dialog>

  <!-- 로그인 창 -->
  <dialog class="sheet" id="authDialog">
    <form class="write-form" id="authForm">
      <h2 class="sheet__title" id="authTitle">Sign in</h2>

      <label class="write-form__label" for="authName">Name</label>
      <input class="write-form__nickname" id="authName" type="text" required maxlength="30"
             autocomplete="username">

      <label class="write-form__label" for="authPassword">Password</label>
      <input class="write-form__nickname" id="authPassword" type="password" required
             minlength="4" maxlength="72" autocomplete="current-password">

      <p class="write-form__error" id="authError" hidden></p>

      <div class="sheet__buttons">
        <button class="button button--quiet" type="button" id="authToggle">Sign up</button>
        <button class="button button--quiet" type="button" id="authCancel">Cancel</button>
        <button class="button" type="submit" id="authSubmit">Sign in</button>
      </div>
    </form>
  </dialog>

  <!-- 순서 주의: 라이브러리 → 접속 설정 → 페이지 코드 -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js?v=240724c"></script>
  <script src="js/auth.js?v=240724c"></script>
  <script src="js/topic.js?v=240724c"></script>
</body>
</html>
